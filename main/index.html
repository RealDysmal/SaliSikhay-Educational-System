<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Text UI</title>


  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h2>Simple Text UI</h2>

    <textarea id="textInput" placeholder="Type something..."></textarea>

    <button onclick="showText()">Submit</button>

    <div class="output" id="outputBox">
      Your text will appear here...
    </div>
  </div>

  <script>
    function showText() {
      const input = document.getElementById("textInput").value;
      document.getElementById("outputBox").textContent = input;
    }
  </script>

</body>
</html>
